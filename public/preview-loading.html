<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPaths — Loading Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── Orbit stage ── */
  .orbit-stage {
    position: relative;
    width: 260px;
    height: 260px;
  }

  /* Subtle glow behind logo */
  .hub-glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 130px; height: 130px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,149,106,.20) 0%, transparent 70%);
    animation: hubGlow 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hubGlow {
    0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: .5; }
    50%      { transform: translate(-50%,-50%) scale(1.18); opacity: 1;  }
  }

  /* ── Centre logo hub ── */
  .logo-hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow:
      0 0 0 7px rgba(80,50,31,.06),
      0 6px 28px rgba(80,50,31,.14);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .logo-hub img {
    width: 58px;
    height: 58px;
  }

  /* ── Paw stamps ── */
  .paw-stamp {
    position: absolute;
    width: 18px; height: 18px;
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 1px 3px rgba(80,50,31,.28));
    will-change: transform, opacity;
  }
  .paw-stamp svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div class="orbit-stage" id="orbitStage">
  <div class="hub-glow"></div>

  <!-- Centre logo — using inline SVG since this is a preview file -->
  <div class="logo-hub">
    <svg width="58" height="58" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>.s0{fill:#ffe1a5}.s1{fill:#50321f}</style>
      </defs>
      <path class="s1" d="M27.47,21.63c0-.98.75-1.68,1.73-1.66.96.01,1.73.78,1.71,1.71-.01.93-.81,1.73-1.73,1.73-.99,0-1.73-.78-1.73-1.78"/>
      <path class="s0" d="M57.78,11.23c-2.1-3.06-4.34-8.52-8.28-8.75-5.05.74-6.75,5.38-2.81,9.68,5.85,6.4,8.12,14.97,5.78,22.57-2.35,9.03-12.52,17.77-22.34,17.78-7.6.35-20.38-7.78-17.5-17.23,20.37-6.53,7.14-17.06,14.94-19.3,2.71.06,7.8,6.28,10.3,6.4,1.01-.03,1.25,1.35,1.94,2,4.6-.03,1.2,6.45-1.34,7.63-2.58,1.54-5.01.6-7.74.56-4.84-.34-9.79,7.19-5.94,10.68,4.91,4.45,14.16-1.26,18.33-6.4,3.71-4.71,4.23-10.02,2.91-15.41-4.01-14.08-13.09-16.71-22.07-14.89C14.22,8.52,5.4,15.94,3.32,26c-6.57,31.72,27.41,39.91,41.56,31.63,14.14-8.28,22.25-31.04,12.89-46.4Z"/>
      <path class="s1" d="M58.05,10.87c-1.63-2.78-2.95-4.99-5.43-7.53-3.04-3.11-8.5-.1-8.37,4.3.11,3.9,3.86,5.78,5.33,9.13,7.07,11.91,2.23,26.43-10.02,32.79-9.33,5.25-20.26,2.29-25.74-7.47-1.14-1.91-1.61-4.2-.86-6.57.04-.09.06-.18.26-.23,19.62-6.07,7.87-17.95,14.14-18.88.59-.1,1.23.14,1.44.25,3.31,1.7,5.7,5.44,9.53,6.13.66,1.08.38,2.24,2.84,2.01,2.7,5.09-7.18,12.72-11.87,2.85-.58,1.91,2.26,3.39.05,4.11-.15.06-.33.11-.49.18-.2.06-1.08.49-1.3.61-9.74,5.87-4.24,19.2,10.33,9.82C55.27,33.09,48.31.6,22.95,5.68,3.01,10.29-2.3,31.69,4.59,46.2c4.24,9.44,16.83,16.41,26.69,15.69,24.54.2,38.53-30.15,26.78-51.02ZM44.22,57.23c-13.16,7.49-31.67,2.01-38.47-11.69C-1.04,31.4,5.13,10.5,25.12,6.71c19.12-3.28,29.86,24.16,11.53,34.68-2.2,1.25-4.79,2.11-7.77,2.41-6.69.44-4.36-8.3-.24-10.19,3.59-1.38,7.52,2.05,10.91-.69,3.76-2.33,4.98-7.48,2.65-11.16-.31-.54-.7-.64-1.24-.58-6.23,1.48-10.07-10.1-16.03-5.5-3.41,3.04.4,8.15-2.09,11.69-1.74,2.89-5.63,4.54-8.6,5.82-.51.2-.64-.04-.71-.45-1.58-6.73-.24-15.39,7.39-17.4.08-.03.15.04.11.08-2.58,3.16-.94,7.82-3.78,10.73,5.67-3.46.3-10.87,10.13-12.51-12.92-2.41-19.11,9.32-15.28,20.41.06.15-.04.23-.11.31-1.64,3.15-.34,7.05.71,8.78,8.24,13.54,21.75,12.02,30.7,5.63,11.32-8.08,16.01-25.22,3.2-38.32-2.46-2.51-.29-6.97,2.86-6.97,1.58,0,2.49,1.19,2.94,1.68,13.69,14.89,10.28,42.22-8.18,52.04h-.01Z"/>
    </svg>
  </div>
</div>

<script>
(function () {
  const NUM_SLOTS = 20;
  const TRAIL     = 4;
  const RADIUS    = 108;
  const PAW_SIZE  = 18;
  const CENTRE    = 130;
  const STEP_MS   = 320;
  const ZIGZAG    = 9;

  const PAW_PATH = 'M465.19,453.459c14.749,67.688-58.752,82.375-91.127,73.562s-98.41-10.281-98.41-10.281s-66.218,1.469-98.593,10.281c-32.375,8.874-105.937-5.875-91.249-73.562s79.438-64.75,97.186-155.999c17.687-91.249,92.718-85.374,92.718-85.374s74.847-5.875,92.535,85.374C385.875,388.709,450.502,385.771,465.19,453.459z M343.586,206.15c39.841,11.505,83.844-19.951,98.349-70.258c14.504-50.245-5.998-100.307,-45.839-111.812c-39.842-11.506-83.844,19.951-98.349,70.258C283.243,144.583,303.745,194.645,343.586,206.15z M508.703,187.852c-38.372-15.668-85.496,10.894-105.264,59.363c-19.768,48.471-4.712,100.43,33.66,116.035c38.372,15.606,85.496-10.894,105.264-59.364C562.131,255.416,547.076,203.519,508.703,187.852z M207.416,206.15c39.841-11.506,60.343-61.567,45.839-111.812s-58.568-81.702-98.349-70.196c-39.78,11.505-60.343,61.566-45.839,111.812C123.572,186.199,167.575,217.655,207.416,206.15z M113.963,363.25c38.373-15.667,53.428-67.626,33.66-116.035s-66.892-75.031-105.264-59.363C3.987,203.519-11.068,255.478,8.7,303.886C28.467,352.356,75.591,378.917,113.963,363.25z';

  const PAW_SVG_DARK = `<svg viewBox="0 0 551.062 551.062" xmlns="http://www.w3.org/2000/svg" style="fill:#50321f"><path d="${PAW_PATH}"/></svg>`;
  const PAW_SVG_WARM = `<svg viewBox="0 0 551.062 551.062" xmlns="http://www.w3.org/2000/svg" style="fill:#C4956A"><path d="${PAW_PATH}"/></svg>`;

  const stage = document.getElementById('orbitStage');

  // Pre-compute slots
  const slots = Array.from({ length: NUM_SLOTS }, (_, i) => {
    const angleDeg = (360 / NUM_SLOTS) * i - 90;
    const angleRad = angleDeg * Math.PI / 180;
    const side     = i % 2 === 0 ? -1 : 1;
    const r        = RADIUS + side * ZIGZAG;
    return {
      cx:      CENTRE + r * Math.cos(angleRad),
      cy:      CENTRE + r * Math.sin(angleRad),
      faceDeg: angleDeg + 180 + side * 12,
      alt:     i % 2 === 1,
    };
  });

  // DOM pool
  const pool = [];
  for (let i = 0; i < TRAIL; i++) {
    const el = document.createElement('div');
    el.className = 'paw-stamp';
    el.innerHTML = i % 2 === 0 ? PAW_SVG_DARK : PAW_SVG_WARM;
    el.style.cssText = 'left:0;top:0;transform-origin:center center;opacity:0;transition:none;';
    stage.appendChild(el);
    pool.push(el);
  }

  const OPACITIES = [1, 0.60, 0.28, 0.08];
  const SCALES    = [1, 0.92, 0.84, 0.74];
  const trail     = [];
  let cursor      = 0;

  function applyStyle(el, faceDeg, opacity, scale) {
    el.style.transition = 'opacity 0.28s ease, transform 0.22s cubic-bezier(.34,1.45,.64,1)';
    el.style.opacity    = opacity;
    el.style.transform  = `rotate(${faceDeg}deg) scale(${scale})`;
  }

  function tick() {
    const slot = slots[cursor % NUM_SLOTS];
    const el   = pool[cursor % TRAIL];

    el.style.transition = 'none';
    el.style.left       = `${slot.cx - PAW_SIZE / 2}px`;
    el.style.top        = `${slot.cy - PAW_SIZE / 2}px`;
    el.style.opacity    = '0';
    el.style.transform  = `rotate(${slot.faceDeg}deg) scale(0.5)`;

    trail.unshift({ el, faceDeg: slot.faceDeg });
    if (trail.length > TRAIL) trail.pop();

    void el.offsetWidth;

    trail.forEach((item, age) => {
      applyStyle(item.el, item.faceDeg, OPACITIES[age] ?? 0, SCALES[age] ?? 0.5);
    });

    cursor++;
    setTimeout(tick, STEP_MS);
  }

  tick();
})();
</script>
